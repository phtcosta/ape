name: sdd-quick-path
version: 1
description: SDD Toolkit Quick Path workflow — plan → tasks → execute. No spec ceremony.

artifacts:
  - id: plan
    generates: plan.md
    description: Analysis document with context, scope, file inventory, and acceptance criteria
    template: plan.md
    instruction: |
      Create the plan document for a mechanical change that needs no design decisions.

      This is a Quick Path change — the task is clear, the plan is mechanical, and the
      only question is execution. No proposal, specs, or design artifacts are needed.

      Sections:
      - **Header**: Change name, date, track (Quick Path), priority, issue tracker link, if applicable,
        PRD reference (if applicable), affected domains
      - **Context**: Why this change is needed. Provide enough background that someone
        reading only this document understands the motivation. Reference the issue tracker link
        for additional context if applicable.
      - **Scope**: What components/files are affected. For large changes, organize into
        groups (Group A, Group B, etc.) with clear descriptions of what each group does.
      - **File Inventory**: Exact files and line numbers when possible. For each file,
        describe the specific change needed (remove lines X-Y, update constant, etc.).
        This is the core of the plan — be precise enough that implementation is mechanical.
      - **Execution Order**: Which groups depend on which. Identify which groups can run
        in parallel via subagent dispatch (see .sdd/docs/SDD-WORKFLOW.md).
      - **Acceptance Criteria**: How to verify the change is complete. Use checkboxes
        (`- [ ]`) for each criterion. These are verification steps, not execution tasks —
        execution tasks go in tasks.md.

      Rules:
      - English language throughout
      - Reference the issue tracker link in the header if applicable
      - Reference FRs/NFRs from docs/PRD.md if one exists
      - For changes touching 20+ files: organize into groups suitable for subagent dispatch
      - File inventory must be exhaustive — every file that will be touched must be listed
      - No promotional language — P4 principle
    requires: []

  - id: tasks
    generates: tasks.md
    description: Execution checklist with trackable tasks extracted from the plan
    template: tasks.md
    instruction: |
      Create the task list that breaks down the execution work from plan.md.

      **IMPORTANT: Follow the template exactly.** The apply phase parses checkbox format
      to track progress. Tasks not using `- [ ]` won't be tracked.

      Guidelines:
      - Extract execution items from the plan's file inventory and execution order
      - Group related tasks under ## numbered headings (match plan groups when applicable)
      - Each task MUST be a checkbox: `- [ ] X.Y Task description`
      - Tasks should be small enough to complete in one Claude Code session
      - Order tasks by dependency (prerequisite groups first)
      - For trivial changes (typo fix, single-file edit): 2-3 checkboxes suffice
      - For large changes (20+ files): organize into independent groups for subagent dispatch,
        with a final verification group

      Example for a large change:
      ```
      ## 1. Prerequisites (sequential)

      - [ ] 1.1 Move discontinued component dirs to backup/
      - [ ] 1.2 Clean dependency configuration
      - [ ] 1.3 Verify dependency resolution

      ## 2. Source Cleanup (parallel — subagent)

      - [ ] 2.1 Clean source files in component A (7 files)
      - [ ] 2.2 Update configuration arrays (3 files)

      ## 3. Verification

      - [ ] 3.1 Run tests on affected components
      - [ ] 3.2 Grep for dangling references
      ```

      Example for a trivial change:
      ```
      ## 1. Fix

      - [ ] 1.1 Fix the bug in tracker component
      - [ ] 1.2 Add regression test

      ## 2. Verify

      - [ ] 2.1 Run component tests
      ```

      Skill annotations (see .sdd/docs/SDD-WORKFLOW.md):
      - After creating a new source file or class: `- [ ] X.N Run /sdd-doc-code <file-path>`
      - After completing a test group: `- [ ] X.N Run /sdd-test-run <module>`
      - After bulk edits (many files): `- [ ] X.N Run /sdd-qa-lint-fix <module>`
      - Orchestrators (/sdd-tdd, /sdd-cleanup, /sdd-refactor) are appropriate in Quick Path when the change
        benefits from their structured workflow — annotate them as group-level tasks when they add value.
      - Final group MUST be: `/sdd-qa-lint-fix <module>` -> `/sdd-verify <module>` -> acceptance criteria from plan.md
      - For changes touching 20+ files: add subagent dispatch hints as HTML comments at the top of tasks.md
        (group dependencies, parallel vs sequential). See .sdd/docs/SDD-WORKFLOW.md.

      Rules:
      - English language throughout
      - Reference plan.md for what needs to be done
      - Each task should be verifiable — you know when it's done
    requires:
      - plan

apply:
  requires: [tasks]
  tracks: tasks.md
  instruction: |
    Read the plan document (plan.md) for full context, then work through pending tasks
    in tasks.md. Mark each task complete (`- [x]`) as you go.

    For each task, choose the appropriate approach:
    - Orchestrators (when their structured workflow adds value over plan.md):
      - /sdd-tdd — when adding tests or fixing bugs (test-first discipline)
      - /sdd-refactor — when restructuring existing code (backup-verify loop)
      - /sdd-cleanup — when removing dead code (backup-verify-rollback safety)
    - Component skills (for specific tasks within groups):
      - /sdd-test-run <module> — run tests after each group
      - /sdd-doc-code <file> — generate docstrings for new source files/classes
      - /sdd-qa-lint-fix <module> — auto-fix formatting after bulk edits
      - /sdd-verify <module> — full verification at intermediate checkpoints
    - Direct edit — for simple, mechanical changes

    Orchestrator skills vs component skills distinction: orchestrators are multi-phase
    workflows with user checkpoints; component skills are single-responsibility tools
    (see .sdd/docs/SDD-WORKFLOW.md).

    Final verification sequence (after all task groups):
    1. /sdd-qa-lint-fix <module> — auto-fix formatting and imports
    2. /sdd-verify <module> — tests + lint + type checks
    3. Verify acceptance criteria from plan.md

    For changes with 3+ independent task groups touching 20+ files, use subagent
    orchestration (see .sdd/docs/SDD-WORKFLOW.md).

    Pause if you hit blockers or need clarification.
